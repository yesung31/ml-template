defaults:
  - _self_
  - data: template
  - model: template

seed: 42
max_epochs: 10
save_every_n_epochs: 50
save_top_k: null
accelerator: "auto"
devices: "auto"
resume: null
compile: false
test: true

wandb: "online" # Options: online, offline, disabled

# Hydra settings
hydra:
  run:
    dir: logs/${data.name}/${model.name}/${now:%Y-%m-%d_%H-%M-%S}
  sweep:
    dir: logs/multirun/${now:%Y-%m-%d_%H-%M-%S}
    subdir: ${data.name}/${model.name}/${hydra.job.num}